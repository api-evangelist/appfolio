aid: appfolio
name: AppFolio
description: AppFolio is a Santa Barbara, California cloud-based real estate technology
  company providing property management software to residential, commercial, community
  association (HOA), student housing, single-family, and affordable housing operators,
  plus investment management tooling for sponsors and funds. Its flagship AppFolio
  Performance Platform unifies workflow automation, accounting and reporting, marketing
  and leasing, maintenance, resident communication, and resident services on a single
  multi-tenant SaaS. AppFolio embeds Realm-X, an in-house agentic AI layer (Realm-X
  Assistant, Performers, Flows) directly into the platform rather than as an add-on.
  Integrations are delivered through the AppFolio Stack marketplace, where certified
  partners (ButterflyMX, Conservice, HappyCo, Knock, Lowe's, Property Meld, and many
  more) connect via the AppFolio Stack API. The Stack API is gated behind a partner
  application, security-compliance questionnaire, and terms-of-service signing; OAuth
  2.0, a sandbox environment, webhooks, and an OpenAPI/Swagger reference are made
  available only to approved partners through the developer.appfolio.com portal, so
  no public specification is reachable for catalog inclusion. AppFolio's revenue model
  is per-unit SaaS subscription plus value-added services (payments, screening, insurance,
  marketing). The AppFolio GitHub organization publishes internal Ruby on Rails, React,
  and tooling libraries (react-gears, ae_page_objects, store_base_sti_class) but no
  public API SDK, CLI, or OpenAPI artifact.
