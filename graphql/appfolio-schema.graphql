  modifiedAt: DateTime!
}

type Applicant {
  id: ID!
  application: ApplicationDetails!
  firstName: String!
  lastName: String!
  email: String!
  phone: String
  dateOfBirth: Date
  ssn: String
  monthlyIncome: Decimal
  employerName: String
