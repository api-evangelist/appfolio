  modifiedAt: DateTime!
}

type VacancyDetails {
  vacancyId: ID!
  availableDate: Date!
  listedDate: Date
  listedRent: Decimal
  marketRent: Decimal
  daysVacant: Int!
  showingAvailable: Boolean
  listingDescription: String
  listingPhotos: [String!]
