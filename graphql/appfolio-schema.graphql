  modifiedAt: DateTime!
}

type DocumentDetails {
  documentId: ID!
  name: String!
  type: DocumentType!
  description: String
  fileSize: Int
  mimeType: String
  uploadedBy: String
  associatedEntityType: String
  associatedEntityId: ID
  expirationDate: Date
  signed: Boolean
  signedAt: DateTime
}

type LeaseDocument {
  id: ID!
  lease: Lease!
