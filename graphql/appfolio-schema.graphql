}

type ReportDetails {
  reportId: ID!
  name: String!
  type: String!
  description: String
  periodStart: Date
  periodEnd: Date
  propertyId: ID
  ownerId: ID
  filters: JSON
  format: String
  downloadUrl: String
}

# ─── Portfolio ────────────────────────────────────────────────────────────────

type Portfolio {
  id: ID!
  details: PortfolioDetails!
  properties: [Property!]!
  owners: [Owner!]!
  createdAt: DateTime!
  modifiedAt: DateTime!
}

type PortfolioDetails {
  portfolioId: ID!
  name: String!
  description: String
  totalUnits: Int!
  occupancyRate: Decimal
  totalRevenue: Decimal
  managementCompany: String
}

# ─── Shared Supporting Types ──────────────────────────────────────────────────

type Contact {
  id: ID!
  firstName: String
  lastName: String
  companyName: String
  email: String
  phone: String
  address: PropertyAddress
  type: String
  notes: String
}

type Note {
  id: ID!
  content: String!
  authorName: String!
  entityType: String
  entityId: ID
  createdAt: DateTime!
  modifiedAt: DateTime!
}

type Attachment {
  id: ID!
  fileName: String!
  fileSize: Int
  mimeType: String
  url: String!
  uploadedBy: String
  uploadedAt: DateTime!
  entityType: String
  entityId: ID
}

# ─── Auth and Integrations ────────────────────────────────────────────────────

type APIKey {
  id: ID!
  name: String!
  keyPrefix: String!
  scopes: [String!]!
  active: Boolean!
  lastUsedAt: DateTime
  expiresAt: DateTime
  createdAt: DateTime!
}

type Token {
  id: ID!
  accessToken: String!
  tokenType: String!
  expiresIn: Int!
  expiresAt: DateTime!
  scopes: [String!]!
  issuedAt: DateTime!
}

type Webhook {
  id: ID!
  url: String!
  eventTypes: [WebhookEventType!]!
  active: Boolean!
  secret: String
  headers: JSON
  createdAt: DateTime!
  modifiedAt: DateTime!
}

type WebhookEvent {
  id: ID!
  webhook: Webhook!
  eventType: WebhookEventType!
  payload: JSON!
  deliveredAt: DateTime
  responseStatus: Int
  attempts: Int!
  lastAttemptAt: DateTime
  createdAt: DateTime!
}

# ─── Queries ──────────────────────────────────────────────────────────────────

type Query {
  property(id: ID!): Property
  properties(portfolioId: ID, type: PropertyType, ownerId: ID, limit: Int, offset: Int): [Property!]!

  unit(id: ID!): Unit
  units(propertyId: ID!, status: UnitStatus, type: UnitType, limit: Int, offset: Int): [Unit!]!

  lease(id: ID!): Lease
  leases(propertyId: ID, unitId: ID, status: LeaseStatus, limit: Int, offset: Int): [Lease!]!

  tenant(id: ID!): Tenant
  tenants(leaseId: ID, propertyId: ID, limit: Int, offset: Int): [Tenant!]!

  owner(id: ID!): Owner
  owners(portfolioId: ID, limit: Int, offset: Int): [Owner!]!

  ownerStatement(id: ID!): OwnerStatement
  ownerStatements(ownerId: ID!, periodStart: Date, periodEnd: Date): [OwnerStatement!]!

  maintenanceRequest(id: ID!): MaintenanceRequest
  maintenanceRequests(propertyId: ID, unitId: ID, status: MaintenanceStatus, category: MaintenanceCategory, limit: Int, offset: Int): [MaintenanceRequest!]!

  workOrder(id: ID!): WorkOrder
  workOrders(propertyId: ID, vendorId: ID, status: WorkOrderStatus, limit: Int, offset: Int): [WorkOrder!]!

  vendor(id: ID!): Vendor
  vendors(type: VendorType, active: Boolean, limit: Int, offset: Int): [Vendor!]!

  invoice(id: ID!): Invoice
  invoices(vendorId: ID, propertyId: ID, status: InvoiceStatus, limit: Int, offset: Int): [Invoice!]!

  payment(id: ID!): Payment
  payments(leaseId: ID, tenantId: ID, status: PaymentStatus, limit: Int, offset: Int): [Payment!]!

  deposit(id: ID!): Deposit
  deposits(leaseId: ID, limit: Int, offset: Int): [Deposit!]!

  transaction(id: ID!): Transaction
  transactions(propertyId: ID, bankAccountId: ID, type: TransactionType, startDate: Date, endDate: Date, limit: Int, offset: Int): [Transaction!]!

  bankAccount(id: ID!): BankAccount
  bankAccounts(propertyId: ID, ownerId: ID, limit: Int, offset: Int): [BankAccount!]!

  reconciliation(id: ID!): Reconciliation
  reconciliations(bankAccountId: ID!, limit: Int, offset: Int): [Reconciliation!]!

  application(id: ID!): ApplicationDetails
  applications(propertyId: ID, unitId: ID, status: ApplicationStatus, limit: Int, offset: Int): [ApplicationDetails!]!

  document(id: ID!): Document
  documents(entityType: String, entityId: ID, type: DocumentType, limit: Int, offset: Int): [Document!]!

  vacancy(id: ID!): Vacancy
  vacancies(propertyId: ID, availableAfter: Date, limit: Int, offset: Int): [Vacancy!]!

  report(id: ID!): Report
  reports(propertyId: ID, type: String, limit: Int, offset: Int): [Report!]!

  portfolio(id: ID!): Portfolio
  portfolios(limit: Int, offset: Int): [Portfolio!]!

  webhook(id: ID!): Webhook
  webhooks(active: Boolean, limit: Int, offset: Int): [Webhook!]!

  apiKeys(active: Boolean): [APIKey!]!
}

# ─── Mutations ────────────────────────────────────────────────────────────────

type Mutation {
  createMaintenanceRequest(input: CreateMaintenanceRequestInput!): MaintenanceRequest!
  updateMaintenanceRequest(id: ID!, input: UpdateMaintenanceRequestInput!): MaintenanceRequest!
  closeMaintenanceRequest(id: ID!, resolutionNotes: String): MaintenanceRequest!

  createWorkOrder(input: CreateWorkOrderInput!): WorkOrder!
  updateWorkOrder(id: ID!, input: UpdateWorkOrderInput!): WorkOrder!
  completeWorkOrder(id: ID!, notes: String): WorkOrder!

  createLease(input: CreateLeaseInput!): Lease!
  updateLease(id: ID!, input: UpdateLeaseInput!): Lease!
  terminateLease(id: ID!, terminationDate: Date!, reason: String): Lease!
  renewLease(id: ID!, newEndDate: Date!, newRentAmount: Decimal): Lease!

  recordPayment(input: RecordPaymentInput!): Payment!
  voidPayment(id: ID!, reason: String!): Payment!

  createInvoice(input: CreateInvoiceInput!): Invoice!
  approveInvoice(id: ID!): Invoice!
  voidInvoice(id: ID!, reason: String!): Invoice!

  createWebhook(input: CreateWebhookInput!): Webhook!
  updateWebhook(id: ID!, input: UpdateWebhookInput!): Webhook!
  deleteWebhook(id: ID!): Boolean!

  generateOwnerStatement(ownerId: ID!, propertyId: ID, periodStart: Date!, periodEnd: Date!): OwnerStatement!
  generateReport(input: GenerateReportInput!): Report!
}

# ─── Input Types ──────────────────────────────────────────────────────────────

input CreateMaintenanceRequestInput {
  propertyId: ID!
  unitId: ID
  tenantId: ID
  category: MaintenanceCategory!
  title: String!
  description: String!
  priority: String!
  permissionToEnter: Boolean
  preferredContactMethod: String
  preferredTime: String
}

input UpdateMaintenanceRequestInput {
  category: MaintenanceCategory
  title: String
  description: String
  priority: String
  status: MaintenanceStatus
  resolutionNotes: String
}

input CreateWorkOrderInput {
  maintenanceRequestId: ID
  propertyId: ID!
  unitId: ID
  vendorId: ID
  title: String!
  description: String!
  scheduledDate: DateTime
  estimatedCost: Decimal
}

input UpdateWorkOrderInput {
  vendorId: ID
  scheduledDate: DateTime
  status: WorkOrderStatus
  actualCost: Decimal
  laborHours: Decimal
  internalNotes: String
  vendorNotes: String
}

input CreateLeaseInput {
  unitId: ID!
  leaseType: LeaseType!
  startDate: Date!
  endDate: Date
  rentAmount: Decimal!
  securityDeposit: Decimal
  tenantIds: [ID!]!
}

input UpdateLeaseInput {
  endDate: Date
  rentAmount: Decimal
  terms: JSON
}

input RecordPaymentInput {
  leaseId: ID
  tenantId: ID
  invoiceId: ID
  amount: Decimal!
  paymentDate: Date!
  method: PaymentMethod!
  reference: String
  memo: String
  checkNumber: String
}

input CreateInvoiceInput {
  vendorId: ID!
  propertyId: ID
  workOrderId: ID
  invoiceDate: Date!
  dueDate: Date
  description: String
  lineItems: [InvoiceLineItemInput!]!
}

input InvoiceLineItemInput {
  description: String!
  quantity: Decimal!
  unitPrice: Decimal!
  glAccount: String
  category: String
}

input CreateWebhookInput {
  url: String!
  eventTypes: [WebhookEventType!]!
  secret: String
  headers: JSON
}

input UpdateWebhookInput {
  url: String
  eventTypes: [WebhookEventType]
  active: Boolean
  headers: JSON
}

input GenerateReportInput {
  name: String!
  type: String!
  periodStart: Date
  periodEnd: Date
